version: '3.9'

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Écrase les valeurs du .env pour pointer vers les services Docker internes
      QDRANT_URL: http://qdrant:6333
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      STATUS_DB_PATH: /app/data/status.db
      # Cache HuggingFace partagé entre redémarrages
      HF_HOME: /models
      # Désactive les warnings symlink HF sur certains FS
      HF_HUB_DISABLE_SYMLINKS_WARNING: "1"
    depends_on:
      - qdrant
      - minio
    volumes:
      - backend_data:/app/data      # status.db + données persistantes
      - hf_models:/models           # modèles HuggingFace/fastembed mis en cache
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"     # nginx dans le conteneur écoute sur 80
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  qdrant_data:
  minio_data:
  hf_models:
  backend_data:
